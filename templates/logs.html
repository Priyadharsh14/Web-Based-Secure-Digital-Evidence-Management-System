<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/css/style.css">

<style>
.log-table {
    width: 100%;
    border-collapse: collapse;
}

.log-table th {
    background: #6a5af9;
    color: white;
    padding: 12px;
}

.log-table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.badge {
    padding: 5px 10px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
}

.upload {
    background: #22c55e;
}

.download {
    background: #3b82f6;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Authority Panel</h2>
    <a href="/authority">View Cases</a>
    <a href="/logs">Audit Logs</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

<h1>Audit Logs</h1>

<div class="box">

<table class="log-table">
<tr>
<th>File</th>
<th>Case ID</th>
<th>User</th>
<th>Action</th>
<th>Time</th>
</tr>

{% for l in logs %}
<tr>
<td>📄 {{l[1]}}</td>
<td>{{l[2]}}</td>
<td>{{l[3]}}</td>

<td>
    {% if l[4] == "UPLOAD" %}
        <span class="badge upload">UPLOAD</span>
    {% else %}
        <span class="badge download">DOWNLOAD</span>
    {% endif %}
</td>

<td>{{l[5]}}</td>
</tr>
{% endfor %}

{% if logs|length == 0 %}
<tr>
<td colspan="5" style="text-align:center;">No logs available</td>
</tr>
{% endif %}

</table>

</div>

</div>

</body>
</html>
